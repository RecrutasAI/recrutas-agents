name: SDR Weekly Outreach

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: true
      batch_size:
        description: 'Number of leads to process'
        type: number
        default: 5

jobs:
  sdr:
    name: Run SDR Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SDR outreach
        run: npm run sdr
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SDR_FROM_EMAIL: ${{ secrets.SDR_FROM_EMAIL }}
          SDR_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SDR_BATCH_SIZE: ${{ inputs.batch_size || '5' }}
